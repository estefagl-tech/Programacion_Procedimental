<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Usuarios</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="usuarios.css" />
  </head>
  <body>
    <nav
      class="navbar is-primary"
      role="navigation"
      aria-label="main navigation"
    >
      <div class="navbar-brand">
        <a class="navbar-item">
          <strong>Usuarios</strong>
        </a>
      </div>
    </nav>

    <section class="section">
      <div class="container">
        <div class="columns is-centered">
          <div class="column is-half">
            <div class="box">
              <h1 class="title has-text-centered">Formulario de Usuario</h1>

              <form>
                <div class="field">
                  <label class="label">Nombre completo</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ingresa tu nombre completo"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Teléfono</label>
                  <div class="control">
                    <input
                      class="input"
                      type="tel"
                      placeholder="Ej: 3001234567"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Dirección</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ingresa tu dirección"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Email</label>
                  <div class="control">
                    <input
                      class="input"
                      type="email"
                      placeholder="ejemplo@correo.com"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Contraseña</label>
                  <div class="control">
                    <input
                      class="input"
                      type="password"
                      placeholder="********"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Fecha de nacimiento</label>
                  <div class="control">
                    <input class="input" type="date" />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Documento de identidad</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Número de documento"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Estado civil</label>
                  <div class="control">
                    <div class="select is-fullwidth">
                      <select>
                        <option>Soltero(a)</option>
                        <option>Casado(a)</option>
                        <option>Divorciado(a)</option>
                        <option>Viudo(a)</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="field">
                  <label class="label">Grupo sanguíneo</label>
                  <div class="control">
                    <div class="select is-fullwidth">
                      <select>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                        <option>O+</option>
                        <option>O-</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="field">
                  <label class="label">Género</label>
                  <div class="control">
                    <div class="select is-fullwidth">
                      <select>
                        <option>Masculino</option>
                        <option>Femenino</option>
                        <option>Otro</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="field">
                  <label class="label">Profesión</label>
                  <div class="control">
                    <input
                      class="input"
                      type="text"
                      placeholder="Ingresa tu profesión"
                    />
                  </div>
                </div>

                <div class="field">
                  <label class="label">Rol</label>
                  <div class="control">
                    <div class="select is-fullwidth">
                      <select>
                        <option>Administrador</option>
                        <option>Usuario</option>
                        <option>Invitado</option>
                      </select>
                    </div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
